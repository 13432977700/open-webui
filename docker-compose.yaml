services:
  ollama:
    volumes:
      - ollama:/root/.ollama
    container_name: ollama
    pull_policy: always
    tty: true
    restart: unless-stopped
    image: ollama/ollama:${OLLAMA_DOCKER_TAG-latest}

  open-webui:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_HASH: ${BUILD_HASH:-latest}
    image: open-webui:${WEBUI_DOCKER_TAG-${BUILD_HASH:-latest}}
    container_name: open-webui
    volumes:
      - open-webui:/app/backend/data
    depends_on:
      - ollama
    ports:
      - ${OPEN_WEBUI_PORT-3000}:8080
    environment:
      - 'OLLAMA_BASE_URL=http://ollama:11434'
      - 'WEBUI_SECRET_KEY='
      - 'ENABLE_API_KEYS=True'
      - XFRAME_OPTIONS=SAMEORIGIN
      - CONTENT_SECURITY_POLICY=frame-ancestors 'self' https://scm.bluestarsolutions.net
      - CORS_ALLOW_ORIGIN=https://scm.bluestarsolutions.net
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped

volumes:
  ollama: {}
  open-webui: {}
